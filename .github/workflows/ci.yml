name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install backend
        working-directory: backend
        run: npm ci
      - name: Build backend
        working-directory: backend
        run: npm run build
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Placeholder for tests
        run: echo "Add tests and linting steps"
        
  deploy:
      name: Deploy to VDS
      runs-on: ubuntu-latest
      needs: all-built
      if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Copy files to server
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.VDS_HOST }}
            username: ${{ secrets.VDS_USER }}
            key: ${{ secrets.VDS_SSH_KEY }}
            source: "docker-compose.prod.yaml,init.sql"
            target: "/opt/carsharing"

        - name: Deploy
          uses: appleboy/ssh-action@v1.2.0
          with:
            host: ${{ secrets.VDS_HOST }}
            username: ${{ secrets.VDS_USER }}
            key: ${{ secrets.VDS_SSH_KEY }}
            script: |
              cd /opt/carsharing
              echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u dimavalencko --password-stdin
              docker compose -f docker-compose.prod.yaml pull
              docker compose -f docker-compose.prod.yaml up -d --force-recreate
              docker image prune -f
              echo "✅ Deploy completed"